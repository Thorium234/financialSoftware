kind = "web"
previewPath = "/"
title = "SchoolLedger Kenya"
version = "1.0.0"
id = "artifacts/school-ledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25087

[services.development]
run = "pnpm --filter @workspace/school-ledger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-ledger", "run", "build" ]
publicDir = "artifacts/school-ledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25087"
BASE_PATH = "/"
